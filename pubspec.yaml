name: bbm_app
description: "Bridal Booker Machine."
publish_to: 'none'
version: 3.2.2+30

environment:
  sdk: ^3.8.1

dependencies:
  firebase_core: ^4.2.0
  firebase_messaging: ^16.0.3
  font_awesome_flutter: ^10.9.0
  flutter_local_notifications: ^19.5.0
  http: ^1.5.0
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.0
  connectivity_plus: ^5.0.2
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2
  app_links: ^6.4.1
  razorpay_flutter: ^1.4.0
  facebook_app_events: ^0.24.0
  webview_flutter: ^4.7.0
  in_app_update: ^4.2.5
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/bbm_logo_feb_8.png
  adaptive_icon_foreground: assets/icons/bbm_logo_feb_8.png
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
